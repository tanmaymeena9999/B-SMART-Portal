<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Access Credentials - B-SMART</title>
        <link rel="stylesheet" href="../../shared/css/variables.css" />
        <link rel="stylesheet" href="../../shared/css/common.css" />
        <link rel="stylesheet" href="../retail-service-report/retail-service-report.css" />
        <link rel="stylesheet" href="access-credentials.css" />
    </head>
    <body>
        <main class="report-shell access-shell">
            <div id="appNavbar"></div>

            <div class="workspace">
                <div id="appSidebar"></div>

                <section class="report-card access-card" aria-label="Access credentials">
                    <div class="view-title access-title">
                        <h1>Access Credentials</h1>
                        <button class="add-credential-button" id="addCredentialButton" type="button">
                            <span aria-hidden="true">+</span>
                            Add
                        </button>
                    </div>

                    <div class="access-content">
                        <form class="credential-form" id="credentialForm" hidden>
                            <input type="hidden" id="credentialId" />

                            <label>
                                <span>Name</span>
                                <input id="credentialName" type="text" autocomplete="name" required />
                            </label>

                            <label>
                                <span>Mail ID</span>
                                <input id="credentialEmail" type="email" autocomplete="email" required />
                            </label>

                            <label>
                                <span>Role</span>
                                <select id="credentialRole" required>
                                    <option value="dealer">Dealer</option>
                                    <option value="country_manager">Country Manager</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </label>

                            <label>
                                <span>Password</span>
                                <input id="credentialPassword" type="password" autocomplete="new-password" />
                            </label>

                            <label>
                                <span>Dealer Code</span>
                                <input id="credentialDealerCode" type="text" />
                            </label>

                            <label>
                                <span>Country Code</span>
                                <input id="credentialCountryCode" type="text" />
                            </label>

                            <label class="status-field">
                                <span>Status</span>
                                <select id="credentialActive">
                                    <option value="true">Active</option>
                                    <option value="false">Inactive</option>
                                </select>
                            </label>

                            <div class="credential-form-actions">
                                <button class="submit-button" type="submit">Submit</button>
                                <button class="secondary-back" id="cancelCredentialButton" type="button">Cancel</button>
                            </div>
                        </form>

                        <p class="access-message" id="accessMessage" aria-live="polite"></p>

                        <div class="access-table-frame">
                            <table class="access-table">
                                <thead>
                                    <tr>
                                        <th>Sl No.</th>
                                        <th>Name</th>
                                        <th>Role</th>
                                        <th>Mail ID</th>
                                        <th>Password</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="credentialsTableBody">
                                    <tr>
                                        <td colspan="7">Loading credentials...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="retail-actions">
                        <button class="secondary-back" type="button" data-secondary-back-button>Back</button>
                    </div>
                </section>
            </div>
        </main>
        <script type="module" src="access-credentials.js"></script>
    </body>
</html>
